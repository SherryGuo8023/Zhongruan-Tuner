<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>中阮调音器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    color: #eee;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
  }

  h1 {
    font-size: 22px;
    color: #e94560;
    margin-bottom: 4px;
    letter-spacing: 2px;
  }

  .subtitle {
    font-size: 13px;
    color: #888;
    margin-bottom: 24px;
  }

  /* 表盘 */
  .meter-wrap {
    position: relative;
    width: 300px;
    height: 180px;
    margin-bottom: 20px;
  }

  #meter-canvas {
    width: 300px;
    height: 180px;
  }

  /* 音名显示 */
  .note-display {
    text-align: center;
    margin-bottom: 20px;
  }

  .note-name {
    font-size: 72px;
    font-weight: 700;
    color: #e94560;
    line-height: 1;
    min-width: 120px;
    display: inline-block;
  }

  .note-freq {
    font-size: 16px;
    color: #aaa;
    margin-top: 6px;
  }

  .cent-value {
    font-size: 18px;
    margin-top: 4px;
    font-weight: 600;
  }

  .cent-value.in-tune { color: #4caf50; }
  .cent-value.flat    { color: #2196f3; }
  .cent-value.sharp   { color: #ff5722; }

  /* 开始按钮 */
  #start-btn {
    background: #e94560;
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 48px;
    font-size: 18px;
    cursor: pointer;
    margin-bottom: 28px;
    transition: background 0.2s;
  }
  #start-btn:active { background: #c73652; }
  #start-btn.active { background: #333; }

  /* 定弦参考 */
  .strings-section {
    width: 100%;
    max-width: 320px;
  }

  .strings-title {
    font-size: 13px;
    color: #888;
    margin-bottom: 10px;
    text-align: center;
  }

  .strings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 10px;
  }

  .string-card {
    background: #16213e;
    border-radius: 12px;
    padding: 14px 8px;
    text-align: center;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.2s, background 0.2s;
  }

  .string-card:active { background: #0f3460; }
  .string-card.active-string { border-color: #e94560; }

  .string-number {
    font-size: 11px;
    color: #888;
    margin-bottom: 4px;
  }

  .string-note {
    font-size: 26px;
    font-weight: 700;
    color: #e94560;
  }

  .string-freq-label {
    font-size: 11px;
    color: #666;
    margin-top: 2px;
  }

  /* 播放参考音按钮 */
  .play-ref-btn {
    display: block;
    margin: 8px auto 0;
    background: none;
    border: 1px solid #444;
    color: #aaa;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    cursor: pointer;
  }
  .play-ref-btn:active { background: #333; }

  .tip {
    font-size: 12px;
    color: #555;
    margin-top: 24px;
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>

<h1>中阮调音器</h1>
<p class="subtitle">标准定弦：低弦→高弦 D · G · D · G</p>

<!-- 表盘 -->
<div class="meter-wrap">
  <canvas id="meter-canvas" width="600" height="360"></canvas>
</div>

<!-- 音名 -->
<div class="note-display">
  <div class="note-name" id="note-name">--</div>
  <div class="note-freq" id="note-freq">等待声音…</div>
  <div class="cent-value" id="cent-value"></div>
</div>

<!-- 开始/停止 -->
<button id="start-btn" onclick="toggleMic()">开始调音</button>

<!-- 定弦参考 -->
<div class="strings-section">
  <div class="strings-title">点击弦号，播放参考音</div>
  <div class="strings-grid" id="strings-grid"></div>
</div>

<p class="tip">请在安静环境中使用<br>拨弦后保持中阮静止，等待读数稳定</p>

<script>
// ── 中阮标准定弦 ──────────────────────────────────────────
const STRINGS = [
  { label: '四弦', note: 'D2', freq: 73.42 },
  { label: '三弦', note: 'G2', freq: 98.00 },
  { label: '二弦', note: 'D3', freq: 146.83 },
  { label: '一弦', note: 'G3', freq: 196.00 },
];

// ── 音符名称表 ────────────────────────────────────────────
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

function freqToNote(freq) {
  if (freq <= 0) return null;
  const midi = 12 * Math.log2(freq / 440) + 69;
  const rounded = Math.round(midi);
  const cents = Math.round((midi - rounded) * 100);
  const octave = Math.floor(rounded / 12) - 1;
  const name = NOTE_NAMES[((rounded % 12) + 12) % 12];
  return { name, octave, cents, midi, freq };
}

// ── 渲染定弦卡片 ──────────────────────────────────────────
const grid = document.getElementById('strings-grid');
STRINGS.forEach((s, i) => {
  const card = document.createElement('div');
  card.className = 'string-card';
  card.id = `string-card-${i}`;
  card.innerHTML = `
    <div class="string-number">${s.label}</div>
    <div class="string-note">${s.note.replace(/\d/, '')}<sub style="font-size:14px">${s.note.match(/\d/)}</sub></div>
    <div class="string-freq-label">${s.freq.toFixed(1)} Hz</div>
    <button class="play-ref-btn" onclick="playRef(${i}, event)">▶ 参考音</button>
  `;
  card.onclick = (e) => { if (!e.target.classList.contains('play-ref-btn')) highlightString(i); };
  grid.appendChild(card);
});

function highlightString(i) {
  document.querySelectorAll('.string-card').forEach(c => c.classList.remove('active-string'));
  document.getElementById(`string-card-${i}`).classList.add('active-string');
}

// ── 播放参考音（Web Audio 合成） ──────────────────────────
let refCtx = null;
let refNode = null;

function playRef(idx, e) {
  e.stopPropagation();
  if (!refCtx) refCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (refNode) { try { refNode.stop(); } catch(_){} }

  const freq = STRINGS[idx].freq;
  const ctx = refCtx;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'triangle';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.4, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 3);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 3);
  refNode = osc;
  highlightString(idx);
}

// ── 表盘绘制 ──────────────────────────────────────────────
const canvas = document.getElementById('meter-canvas');
const ctx2 = canvas.getContext('2d');
const W = 600, H = 360;
const CX = W / 2, CY = H - 30;
const R = 260;

function drawMeter(cents) {
  ctx2.clearRect(0, 0, W, H);

  // 背景弧
  ctx2.beginPath();
  ctx2.arc(CX, CY, R, Math.PI, 0);
  ctx2.lineWidth = 28;
  ctx2.strokeStyle = '#16213e';
  ctx2.stroke();

  // 绿色中心区 (±15 cent)
  const a1 = Math.PI + (Math.PI * (50 - 15) / 100);
  const a2 = Math.PI + (Math.PI * (50 + 15) / 100);
  ctx2.beginPath();
  ctx2.arc(CX, CY, R, a1, a2);
  ctx2.strokeStyle = '#1b5e20';
  ctx2.lineWidth = 28;
  ctx2.stroke();

  // 刻度
  for (let c = -50; c <= 50; c += 10) {
    const angle = Math.PI + (Math.PI * (c + 50) / 100);
    const inner = R - 22;
    const outer = R + 2;
    ctx2.beginPath();
    ctx2.moveTo(CX + inner * Math.cos(angle), CY + inner * Math.sin(angle));
    ctx2.lineTo(CX + outer * Math.cos(angle), CY + outer * Math.sin(angle));
    ctx2.strokeStyle = c === 0 ? '#4caf50' : '#444';
    ctx2.lineWidth = c === 0 ? 4 : 2;
    ctx2.stroke();

    // 刻度文字
    if (c % 20 === 0) {
      const tx = CX + (R - 44) * Math.cos(angle);
      const ty = CY + (R - 44) * Math.sin(angle);
      ctx2.fillStyle = '#666';
      ctx2.font = '22px sans-serif';
      ctx2.textAlign = 'center';
      ctx2.textBaseline = 'middle';
      ctx2.fillText(c === 0 ? '0' : (c > 0 ? '+' + c : c), tx, ty);
    }
  }

  // 指针
  const clamp = Math.max(-50, Math.min(50, cents));
  const angle = Math.PI + (Math.PI * (clamp + 50) / 100);
  const px = CX + (R - 10) * Math.cos(angle);
  const py = CY + (R - 10) * Math.sin(angle);

  const inTune = Math.abs(cents) < 5;
  ctx2.beginPath();
  ctx2.moveTo(CX, CY);
  ctx2.lineTo(px, py);
  ctx2.strokeStyle = inTune ? '#4caf50' : '#e94560';
  ctx2.lineWidth = 6;
  ctx2.lineCap = 'round';
  ctx2.stroke();

  // 中心点
  ctx2.beginPath();
  ctx2.arc(CX, CY, 12, 0, Math.PI * 2);
  ctx2.fillStyle = inTune ? '#4caf50' : '#e94560';
  ctx2.fill();
}

drawMeter(0);

// ── 麦克风 + 音高检测 ─────────────────────────────────────
let audioCtx = null, analyser = null, micStream = null;
let running = false;
let animFrame = null;
let smoothedCents = 0;

const startBtn = document.getElementById('start-btn');
const noteNameEl = document.getElementById('note-name');
const noteFreqEl = document.getElementById('note-freq');
const centValueEl = document.getElementById('cent-value');

async function toggleMic() {
  if (running) {
    stopMic();
  } else {
    await startMic();
  }
}

async function startMic() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false }, video: false });
    micStream = stream;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 4096;
    analyser.smoothingTimeConstant = 0.1;
    const source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
    running = true;
    startBtn.textContent = '停止调音';
    startBtn.classList.add('active');
    detect();
  } catch (e) {
    alert('无法访问麦克风，请检查权限设置。\n\n' + e.message);
  }
}

function stopMic() {
  running = false;
  if (animFrame) cancelAnimationFrame(animFrame);
  if (micStream) micStream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close();
  startBtn.textContent = '开始调音';
  startBtn.classList.remove('active');
  noteNameEl.textContent = '--';
  noteFreqEl.textContent = '等待声音…';
  centValueEl.textContent = '';
  drawMeter(0);
}

// YIN 算法简化版
function yin(buffer, sampleRate) {
  const N = buffer.length;
  const half = Math.floor(N / 2);
  const threshold = 0.15;
  const diff = new Float32Array(half);

  for (let tau = 1; tau < half; tau++) {
    let s = 0;
    for (let i = 0; i < half; i++) {
      const d = buffer[i] - buffer[i + tau];
      s += d * d;
    }
    diff[tau] = s;
  }

  // 累积均值归一化
  const cmnd = new Float32Array(half);
  cmnd[0] = 1;
  let runSum = 0;
  for (let tau = 1; tau < half; tau++) {
    runSum += diff[tau];
    cmnd[tau] = diff[tau] / (runSum / tau);
  }

  // 找第一个低于阈值的谷
  let tau = 2;
  while (tau < half) {
    if (cmnd[tau] < threshold) {
      while (tau + 1 < half && cmnd[tau + 1] < cmnd[tau]) tau++;
      break;
    }
    tau++;
  }
  if (tau === half || cmnd[tau] >= threshold) return -1;

  // 抛物线插值
  const x0 = tau > 1 ? tau - 1 : tau;
  const x2 = tau < half - 1 ? tau + 1 : tau;
  let betterTau;
  if (x0 === tau) betterTau = cmnd[tau] <= cmnd[x2] ? tau : x2;
  else if (x2 === tau) betterTau = cmnd[tau] <= cmnd[x0] ? tau : x0;
  else {
    const s0 = cmnd[x0], s1 = cmnd[tau], s2 = cmnd[x2];
    betterTau = tau + (s2 - s0) / (2 * (2 * s1 - s2 - s0));
  }

  return sampleRate / betterTau;
}

function detect() {
  if (!running) return;
  const buf = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);

  // 信号能量检测，太安静就不显示
  let rms = 0;
  for (let i = 0; i < buf.length; i++) rms += buf[i] * buf[i];
  rms = Math.sqrt(rms / buf.length);

  if (rms > 0.01) {
    const freq = yin(buf, audioCtx.sampleRate);
    if (freq > 40 && freq < 800) {
      const info = freqToNote(freq);
      if (info) {
        noteNameEl.textContent = info.name + info.octave;
        noteFreqEl.textContent = freq.toFixed(1) + ' Hz';

        // 平滑 cents
        smoothedCents = smoothedCents * 0.6 + info.cents * 0.4;
        const sc = Math.round(smoothedCents);
        drawMeter(smoothedCents);

        if (Math.abs(sc) < 5) {
          centValueEl.textContent = '✓ 准确';
          centValueEl.className = 'cent-value in-tune';
        } else if (sc < 0) {
          centValueEl.textContent = sc + ' cent  偏低';
          centValueEl.className = 'cent-value flat';
        } else {
          centValueEl.textContent = '+' + sc + ' cent  偏高';
          centValueEl.className = 'cent-value sharp';
        }
      }
    }
  }

  animFrame = requestAnimationFrame(detect);
}
</script>
</body>
</html>
